name = "bpnz-membership"
main = "src/index.ts"
compatibility_date = "2026-06-01"
# Bitcoin Policy New Zealand account — pinned so deploys can never land in a
# personal account by mistake.
account_id = "6e7a00d27773931d4afdeaac9c76b89f"

# One daily tick at 17:00 UTC (5–6am next day in NZ). All real scheduling
# logic evaluates dates in Pacific/Auckland in code — see src/reminders/.
[triggers]
crons = ["0 17 * * *"]

# Persist Worker logs (incl. cron runs) so dry-run ticks can be reviewed in
# the dashboard after the fact.
[observability]
enabled = true

[vars]
ORG_TIMEZONE = "Pacific/Auckland"
# Keep DRY_RUN=1 until mail.nzbitcoin.org is verified in Resend and one
# observed real run looks right; then set to "0".
DRY_RUN = "1"
MAIL_FROM = "BPNZ Governance <reminders@mail.nzbitcoin.org>"

# Secrets (set with `wrangler secret put <NAME>`), not stored here:
#   RESEND_API_KEY        Resend API key
#   COMMITTEE_RECIPIENTS  JSON: {"committee": ["..."], "key-holders": ["..."]}
# Phase 4 adds: FIELD_ENCRYPTION_KEY, BLIND_INDEX_KEY, BTCPAY_API_KEY,
#   BTCPAY_WEBHOOK_SECRET, UNSUBSCRIBE_SIGNING_KEY

# Phase 4: D1 database for encrypted members/contacts
# [[d1_databases]]
# binding = "DB"
# database_name = "bpnz-membership"
# database_id = "<created with: wrangler d1 create bpnz-membership>"
